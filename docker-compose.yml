services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
    restart: unless-stopped

# Note: Database is currently using Supabase Cloud. 
# If local Postgres is needed, a 'db' service can be added here.
