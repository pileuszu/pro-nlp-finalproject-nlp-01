name: Frontend Build & Deploy (Vercel)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Run Tests
        working-directory: ./frontend
        run: npm test

      - name: Deploy to Vercel
        id: deploy-vercel
        uses: amondnet/vercel-action@v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: latest
          working-directory: ./frontend
          vercel-args: '--prod -e NEXT_PUBLIC_API_MOCKING=disabled -b NEXT_PUBLIC_API_MOCKING=disabled -e NEXT_PUBLIC_API_URL=https://pro-nlp-backend-511248599405.asia-northeast3.run.app -b NEXT_PUBLIC_API_URL=https://pro-nlp-backend-511248599405.asia-northeast3.run.app'

      - name: Display Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** [${{ steps.deploy-vercel.outputs.preview-url }}](${{ steps.deploy-vercel.outputs.preview-url }})" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production (Cloud API Enabled)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "테스트가 성공적으로 완료되었으며, Vercel에 최신 버전이 배포되었습니다." >> $GITHUB_STEP_SUMMARY
