name: Frontend Preview Build (Mocking)

on:
  push:
    branches:
      - frontend

jobs:
  build:
    name: Build & Test (Mocking Enabled)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build Project
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_MOCKING: enabled
        run: npm run build

      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint
